<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    html, body { background: transparent; overflow: hidden; width: 100%; height: 100%; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      -webkit-app-region: drag;
      /* near-invisible alpha so transparent regions still hit-test
         (fully transparent pixels are click-through on Windows) */
      background: rgba(0, 0, 0, 0.02);
    }

    /* fixed 320x320 layout, scaled to the window size */
    #root { width: 320px; height: 320px; transform-origin: 0 0; }
    #gauge { width: 320px; height: 320px; }

    #close-btn {
      -webkit-app-region: no-drag;
      position: fixed;
      top: 8px; right: 8px;
      width: 26px; height: 26px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(20, 22, 28, 0.9);
      color: rgba(255, 255, 255, 0.65);
      font-size: 13px;
      line-height: 24px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 30;
    }
    body.hovered #close-btn { opacity: 1; }
    #close-btn:hover { background: rgba(255, 80, 80, 0.4); color: #fff; }
  </style>
</head>
<body>
  <div id="root">
    <svg id="gauge" viewBox="0 0 320 320"></svg>
  </div>
  <button id="close-btn" title="Close widget">&#x2715;</button>
  <script src="renderer.js"></script>
</body>
</html>
